<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gravity — Code Intelligence Dashboard</title>
  <meta name="description" content="Analyze your Rust projects with code intelligence: dependency graphs, cyclomatic complexity, dead code detection, and architecture insights." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="text/javascript"
    src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js">
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

    :root {
      --bg-primary:   #070a1a;
      --bg-secondary: rgba(19, 24, 47, 0.7);
      --bg-card:      rgba(26, 35, 66, 0.6);
      --bg-hover:     rgba(34, 45, 71, 0.8);
      --border:       rgba(45, 58, 90, 0.6);
      --accent:       #8b5cf6;
      --accent-light: #c4b5fd;
      --accent-darker: #6d28d9;
      --primary-light: #818cf8;
      --text-primary: #f8fafc;
      --text-muted:   #94a3b8;
      --success:      #10b981;
      --warning:      #f59e0b;
      --danger:       #ef4444;
    }
    
    .glass {
      background: var(--bg-secondary);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    
    .glass-card {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
    }

    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 85% 30%, rgba(99, 102, 241, 0.08) 0%, transparent 50%);
      background-attachment: fixed;
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    #graph-container {
      width: 100%;
      height: 550px;
      border-radius: 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .complexity-low    { color: var(--success); }
    .complexity-medium { color: var(--warning); }
    .complexity-high   { color: var(--danger);  }

    code, .mono { 
      font-family: 'JetBrains Mono', monospace; 
      font-weight: 500;
    }

    h1, h2, h3, h4, .font-heading {
      font-family: 'Outfit', sans-serif;
      letter-spacing: -0.02em;
    }

    /* Scrollbar */
    ::-webkit-scrollbar       { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: rgba(19, 24, 47, 0.5); }
    ::-webkit-scrollbar-thumb { 
      background: rgba(45, 58, 90, 0.8); 
      border-radius: 4px; 
      transition: background 0.2s;
    }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent-light); }

    /* Button styles */
    button {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-weight: 500;
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px -6px rgba(139, 92, 246, 0.5);
    }

    button:active:not(:disabled) {
      transform: translateY(0px);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Input styles */
    input, textarea {
      transition: all 0.3s ease;
    }

    input:focus, textarea:focus {
      border-color: var(--accent) !important;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1) !important;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .animate-fadeIn {
      animation: fadeIn 0.3s ease-out;
    }

    .animate-spin {
      animation: spin 1s linear infinite;
    }

    /* Responsive */
    @media (max-width: 768px) {
      #graph-container {
        height: 400px;
      }

      .grid {
        grid-template-columns: 1fr !important;
      }
    }

    /* Gradient backgrounds */
    .gradient-purple {
      background: linear-gradient(135deg, var(--accent), var(--accent-darker));
    }

    .gradient-card {
      background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-hover) 100%);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .text-gradient {
      background: linear-gradient(to right, #c4b5fd, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Badge styles */
    .badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .badge-success {
      background: rgba(16, 185, 129, 0.15);
      color: var(--success);
    }

    .badge-warning {
      background: rgba(245, 158, 11, 0.15);
      color: var(--warning);
    }

    .badge-danger {
      background: rgba(239, 68, 68, 0.15);
      color: var(--danger);
    }

    /* Table styles */
    table {
      border-collapse: collapse;
    }

    table thead tr {
      border-bottom: 1px solid var(--border);
    }

    table tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background-color 0.2s;
    }

    table tbody tr:hover {
      background-color: var(--bg-hover) !important;
    }

    /* Card hover effect */
    .card-hover {
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .card-hover:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.15);
    }
  </style>
</head>
<body>
  <div id="app"></div>
</body>
</html>
