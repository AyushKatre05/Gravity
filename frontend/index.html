<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gravity — Code Intelligence Dashboard</title>
  <meta name="description" content="Analyze your Rust projects with code intelligence: dependency graphs, cyclomatic complexity, dead code detection, and architecture insights." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="text/javascript"
    src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js">
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

    :root {
      --bg-primary:   #000000;
      --bg-secondary: #0a0a0a;
      --bg-card:      #111111;
      --bg-hover:     #1a1a1a;
      --border:       #2a2a2a;
      --accent:       #8b5cf6;
      --accent-light: #a78bfa;
      --accent-darker: #7c3aed;
      --primary-light: #ffffff;
      --text-primary: #ffffff;
      --text-muted:   #888888;
      --success:      #ffffff;
      --warning:      #ffffff;
      --danger:       #ffffff;
    }
    
    .glass {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
    }
    
    .glass-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
    }

    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    html, body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
    }



    #graph-container {
      width: 100%;
      height: 550px;
      border-radius: 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .complexity-low    { color: var(--success); }
    .complexity-medium { color: var(--warning); }
    .complexity-high   { color: var(--danger);  }

    code, .mono { 
      font-family: 'JetBrains Mono', monospace; 
      font-weight: 500;
    }

    h1, h2, h3, h4, .font-heading {
      font-family: 'Outfit', sans-serif;
      letter-spacing: -0.02em;
    }

    /* Scrollbar */
    ::-webkit-scrollbar       { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-secondary); }
    ::-webkit-scrollbar-thumb { 
      background: var(--border); 
      border-radius: 0; 
      transition: background 0.2s;
    }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* Button styles */
    button {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-weight: 500;
    }

    button:hover:not(:disabled) {
      background: var(--bg-hover);
      border-color: var(--text-primary);
    }

    button:active:not(:disabled) {
      transform: translateY(0px);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Input styles */
    input, textarea {
      transition: all 0.3s ease;
    }

    input:focus, textarea:focus {
      border-color: var(--text-primary) !important;
      outline: none;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .animate-fadeIn {
      animation: fadeIn 0.3s ease-out;
    }

    .animate-spin {
      animation: spin 1s linear infinite;
    }

    /* Responsive */
    @media (max-width: 768px) {
      #graph-container {
        height: 400px;
      }

      .grid {
        grid-template-columns: 1fr !important;
      }
    }

    /* Gradient backgrounds removed - replaced with flat colors */
    .gradient-purple {
      background: var(--accent);
    }

    .gradient-card {
      background: var(--bg-card);
    }

    .text-gradient {
      color: var(--text-primary);
    }

    /* Badge styles */
    .badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .badge-success {
      border: 1px solid var(--text-muted);
      color: var(--text-primary);
    }

    .badge-warning {
      border: 1px solid var(--text-muted);
      color: var(--text-primary);
    }

    .badge-danger {
      border: 1px solid var(--text-muted);
      color: var(--text-primary);
    }

    /* Table styles */
    table {
      border-collapse: collapse;
    }

    table thead tr {
      border-bottom: 1px solid var(--border);
    }

    table tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background-color 0.2s;
    }

    table tbody tr:hover {
      background-color: var(--bg-hover) !important;
    }

    /* Card hover effect */
    .card-hover {
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .card-hover:hover {
      border-color: var(--text-muted);
      background-color: var(--bg-hover);
    }
  </style>
</head>
<body></body>
</html>
