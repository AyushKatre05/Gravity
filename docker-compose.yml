version: "3.9"

services:
  # ── PostgreSQL Database ────────────────────────────────────────────────────
  # Using Neon serverless PostgreSQL (external service, not containerized)


  # ── Backend ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://neondb_owner:npg_PtKo9vMZsr8x@ep-orange-scene-ab3pw8x8-pooler.eu-west-2.aws.neon.tech/neondb?sslmode=require&channel_binding=require
      PORT: "8080"
      ANALYZE_PATH: "/analyze"
      RUST_LOG: "info"
    volumes:
      # Mount the project you want to analyze.
      # Change the left-hand path to point at a local Rust project.
      - ./sample_project:/analyze:ro
    networks:
      - gravity-net
    restart: unless-stopped

  # ── Gateway (Production-like Nginx) ────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    ports:
      - "80:80"
    environment:
      BACKEND_URL: http://backend:8080
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - gravity-net
    restart: unless-stopped

volumes:
  frontend-dist:


networks:
  gravity-net:
    driver: bridge
