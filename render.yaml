services:
  - type: pserv
    name: gravity-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: RUST_LOG
        value: info
      - key: ANALYZE_PATH
        value: /analyze
      - key: PORT
        value: "8080"
    healthCheckPath: /health
    healthCheckInterval: 30

  - type: web
    name: gravity-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    envVars: []
    staticSite: true
