databases:
  - name: gravity-db
    plan: free

services:
  - type: web
    name: gravity-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gravity-db
          property: connectionString
      - key: RUST_LOG
        value: info
      - key: ANALYZE_PATH
        value: /analyze
      - key: PORT
        value: "8080"
    healthCheckPath: /health

  - type: web
    name: gravity-gateway
    runtime: docker
    dockerfilePath: ./nginx/Dockerfile
    dockerContext: .
    envVars:
      - key: BACKEND_URL
        value: http://gravity-backend:8080
